
name: Grok Project CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Get the code from your repository
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Upload the files so the deploy job can use them
      # (Change '.' to your build folder like 'dist' or 'public' if you use a framework)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # Step 3: Deploy the uploaded files to GitHub Pages live site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
