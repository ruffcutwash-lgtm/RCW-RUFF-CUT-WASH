name: Grok Project CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Fixed from python-node typo

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Grok tests or builds
      env:
        GROK_API_KEY: ${{ secrets.GROK_API_KEY }} # Securely loads your API key
      run: |
        python run_build.py # Replace with your actual build command
